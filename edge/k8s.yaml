# =============================================================
# edge/k8s.yaml  –  All manifests for the edge environment
# Same VNF as cloud but with tighter resource limits and
# edge-tuned NGINX config (fewer worker_connections, etc.)
# =============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: vnf-edge
  labels:
    environment: edge

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: vnf-edge
data:
  nginx.conf: |
    worker_processes 1;           # Edge: single worker (limited CPU)
    events { worker_connections 256; }  # Edge: lower concurrency ceiling
    http {
      log_format main '$remote_addr "$request" $status rt=$request_time '
                      'uct=$upstream_connect_time urt=$upstream_response_time';
      access_log /var/log/nginx/access.log main buffer=4k flush=5s;

      upstream backends {
        server backend-svc:80;
      }

      server {
        listen 80;
        keepalive_timeout 15;     # Edge: shorter keep-alive
        location /healthz { return 200 "OK\n"; }
        location /nginx_status { stub_status on; }
        location / {
          proxy_pass http://backends;
          proxy_connect_timeout 3s;
          proxy_read_timeout    5s;
          proxy_set_header X-Real-IP $remote_addr;
          add_header X-Upstream $upstream_addr always;
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-lb
  namespace: vnf-edge
  labels:
    app: nginx-lb
    vnf: load-balancer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-lb
  template:
    metadata:
      labels:
        app: nginx-lb
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9113"
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: cfg
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests: { cpu: 75m,  memory: 32Mi }
          limits:   { cpu: 200m, memory: 128Mi }  # Edge: tight limits
        readinessProbe:
          httpGet: { path: /healthz, port: 80 }
          initialDelaySeconds: 5
      - name: exporter
        image: nginx/nginx-prometheus-exporter:0.11.0
        args: ["--nginx.scrape-uri=http://localhost/nginx_status"]
        ports:
        - containerPort: 9113
        resources:
          limits: { cpu: 20m, memory: 16Mi }
      volumes:
      - name: cfg
        configMap:
          name: nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-lb-svc
  namespace: vnf-edge
spec:
  type: NodePort
  selector:
    app: nginx-lb
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31080   # k3d maps this to localhost:31080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: vnf-edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: httpd
        image: httpd:2.4-alpine
        ports:
        - containerPort: 80
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "<h1>Edge backend: $POD_NAME</h1>" > /usr/local/apache2/htdocs/index.html && httpd-foreground
        resources:
          requests: { cpu: 50m, memory: 32Mi }
          limits:   { cpu: 150m, memory: 64Mi }  # Edge: very tight

---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: vnf-edge
spec:
  selector:
    app: backend
  ports:
  - port: 80

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-config
  namespace: vnf-edge
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s   # Edge: less frequent to save resources
    scrape_configs:
    - job_name: nginx
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [vnf-edge]
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        separator: ':'
        target_label: __address__

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: vnf-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: default
      containers:
      - name: prometheus
        image: prom/prometheus:v2.47.0
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.retention.time=30m"  # Edge: minimal retention
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: cfg
          mountPath: /etc/prometheus
        resources:
          limits: { cpu: 150m, memory: 256Mi }  # Edge: half of cloud
      volumes:
      - name: cfg
        configMap:
          name: prom-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: vnf-edge
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
  - port: 9090
    nodePort: 31090

---
# ── Grafana (minimal dashboard — brief says "minimal dashboards to avoid heavy resource usage") ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: vnf-edge
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_DATASOURCES_DEFAULT_NAME
          value: "Prometheus"
        - name: GF_DATASOURCES_DEFAULT_TYPE
          value: "prometheus"
        - name: GF_DATASOURCES_DEFAULT_URL
          value: "http://prometheus-svc:9090"
        - name: GF_DATASOURCES_DEFAULT_ACCESS
          value: "proxy"
        - name: GF_DATASOURCES_DEFAULT_ISDEFAULT
          value: "true"
        - name: GF_ANALYTICS_REPORTING_ENABLED
          value: "false"
        - name: GF_ANALYTICS_CHECK_FOR_UPDATES
          value: "false"
        resources:
          requests: { cpu: 50m,  memory: 64Mi  }
          limits:   { cpu: 100m, memory: 128Mi }  # Edge: tight Grafana budget

        volumeMounts:
        - name: storage
          mountPath: /var/lib/grafana
      volumes:
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: vnf-edge
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 31300

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prom-edge
rules:
- apiGroups: [""]
  resources: [pods, services, endpoints, nodes]
  verbs: [get, list, watch]
- nonResourceURLs: [/metrics]
  verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prom-edge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prom-edge
subjects:
- kind: ServiceAccount
  name: default
  namespace: vnf-edge
