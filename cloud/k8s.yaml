
# ── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: vnf-cloud
  labels:
    environment: cloud

---
# ── NGINX config (the VNF behaviour) ────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: vnf-cloud
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      log_format main '$remote_addr "$request" $status rt=$request_time '
                      'uct=$upstream_connect_time urt=$upstream_response_time';
      access_log /var/log/nginx/access.log main;

      upstream backends {
        server backend-svc:80;   # kube-dns resolves → all backend pod IPs
      }

      server {
        listen 80;
        location /healthz { return 200 "OK\n"; }
        location /nginx_status { stub_status on; }
        location / {
          proxy_pass http://backends;
          proxy_set_header X-Real-IP $remote_addr;
          add_header X-Upstream $upstream_addr always;
        }
      }
    }

---
# ── NGINX LB Deployment (the VNF pod) ───────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-lb
  namespace: vnf-cloud
  labels:
    app: nginx-lb
    vnf: load-balancer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-lb
  template:
    metadata:
      labels:
        app: nginx-lb
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9113"
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: cfg
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests: { cpu: 150m, memory: 64Mi }
          limits:   { cpu: 500m, memory: 256Mi }  # Cloud: generous limits
        readinessProbe:
          httpGet: { path: /healthz, port: 80 }
          initialDelaySeconds: 5
      - name: exporter           # sidecar: NGINX → Prometheus metrics
        image: nginx/nginx-prometheus-exporter:0.11.0
        args: ["--nginx.scrape-uri=http://localhost/nginx_status"]
        ports:
        - containerPort: 9113
        resources:
          limits: { cpu: 50m, memory: 32Mi }
      volumes:
      - name: cfg
        configMap:
          name: nginx-config

---
# ── NGINX Service (NodePort so we can reach it from outside) ─
apiVersion: v1
kind: Service
metadata:
  name: nginx-lb-svc
  namespace: vnf-cloud
spec:
  type: NodePort
  selector:
    app: nginx-lb
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080

---
# ── Backend Deployment (2 replicas NGINX distributes across) ─
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: vnf-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: httpd
        image: httpd:2.4-alpine
        ports:
        - containerPort: 80
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "<h1>Cloud backend: $POD_NAME</h1>" > /usr/local/apache2/htdocs/index.html && httpd-foreground
        resources:
          requests: { cpu: 50m,  memory: 32Mi }
          limits:   { cpu: 300m, memory: 128Mi }

---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: vnf-cloud
spec:
  selector:
    app: backend
  ports:
  - port: 80

---
# ── Prometheus (scrapes NGINX exporter sidecar) ──────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-config
  namespace: vnf-cloud
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    - job_name: nginx
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [vnf-cloud]
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        separator: ':'
        target_label: __address__

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: vnf-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: default
      containers:
      - name: prometheus
        image: prom/prometheus:v2.47.0
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.retention.time=1h"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: cfg
          mountPath: /etc/prometheus
        resources:
          limits: { cpu: 300m, memory: 512Mi }
      volumes:
      - name: cfg
        configMap:
          name: prom-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: vnf-cloud
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
  - port: 9090
    nodePort: 30090

---
# ── Grafana (dashboard for Prometheus metrics) ───────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: vnf-cloud
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        # Auto-provision Prometheus as the default datasource
        - name: GF_DATASOURCES_DEFAULT_NAME
          value: "Prometheus"
        - name: GF_DATASOURCES_DEFAULT_TYPE
          value: "prometheus"
        - name: GF_DATASOURCES_DEFAULT_URL
          value: "http://prometheus-svc:9090"
        - name: GF_DATASOURCES_DEFAULT_ACCESS
          value: "proxy"
        - name: GF_DATASOURCES_DEFAULT_ISDEFAULT
          value: "true"
        - name: GF_ANALYTICS_REPORTING_ENABLED
          value: "false"
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits:   { cpu: 200m, memory: 256Mi }  # Cloud: reasonable Grafana budget
        volumeMounts:
        - name: storage
          mountPath: /var/lib/grafana
      volumes:
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: vnf-cloud
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prom-cloud
rules:
- apiGroups: [""]
  resources: [pods, services, endpoints, nodes]
  verbs: [get, list, watch]
- nonResourceURLs: [/metrics]
  verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prom-cloud
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prom-cloud
subjects:
- kind: ServiceAccount
  name: default
  namespace: vnf-cloud
